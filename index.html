<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Javascript</title>
<link rel="stylesheet" type="text/css" href="assets/style.css">
</head>

<body>
    <div>
        <p class="title"><em>Projet Calculatrice en Javascript</em></p>
    </div>
    
    <div class="premierbloc">
        <img src="assets/imgcalc.png"><br><br>
    </div>
    
    <table>
    <tr>
    <td><input style="background-color:#86D86D" type="button" value="c" onclick="clr()"/> </td>
    <td colspan="3"><input type="text" id="screen"/></td>
    </tr>
    <tr>
    <td><input type="button" value="7" onclick="dis('7')"/> </td>
    <td><input type="button" value="8" onclick="dis('8')"/> </td>
    <td><input type="button" value="9" onclick="dis('9')"/> </td>
    <td><input style="background-color:#B5AFAD" type="button" value="+" onclick="dis('+')"/> </td>
    </tr>
    <tr>
    <td><input type="button" value="4" onclick="dis('4')"/> </td>
    <td><input type="button" value="5" onclick="dis('5')"/> </td>
    <td><input type="button" value="6" onclick="dis('6')"/> </td>
    <td><input style="background-color:#B5AFAD" type="button" value="-" onclick="dis('-')"/> </td>
    </tr>
    <tr>
    <td><input type="button" value="1" onclick="dis('1')"/> </td>
    <td><input type="button" value="2" onclick="dis('2')"/> </td>
    <td><input type="button" value="3" onclick="dis('3')"/> </td>
    <td><input style="background-color:#B5AFAD" type="button" value="/" onclick="dis('/')"/> </td>
    </tr>
    <tr>
    <td><input style="background-color:#D83513" type="button" value="=" onclick="solve()"/> </td>
    <td><input type="button" value="0" onclick="dis('0')"/> </td>
    <td><input type="button" value="." onclick="dis('.')"/> </td>
    <td><input style="background-color:#B5AFAD" type="button" value="*" onclick="dis('*')"/> </td>
    </tr>
    </table>

    <script type="text/javascript" src="assets/script.js"></script>

</body>
</html>
